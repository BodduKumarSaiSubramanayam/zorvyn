services:
  - type: web
    name: zorvyn-finance-backend
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx prisma migrate deploy && npm run seed && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:./dev.db
      - key: CORS_ORIGIN
        sync: false # Set this in the Render dashboard after deploying the frontend
